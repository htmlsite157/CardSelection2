<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Mini Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Arial', sans-serif;
    }
    .game-container {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 150px);
      grid-template-rows: repeat(3, 200px);
      gap: 20px;
      perspective: 1000px;
    }
    @media (max-width: 768px) {
      .grid { grid-template-columns: repeat(3, 100px); grid-template-rows: repeat(3, 140px); gap: 12px; }
    }
    @media (max-width: 480px) {
      .grid { grid-template-columns: repeat(3, 85px); grid-template-rows: repeat(3, 120px); gap: 10px; }
    }
    .card {
      position: relative;
      width: 150px;
      height: 200px;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 0.6s;
      pointer-events: none;
    }
    @media (max-width: 768px) { .card { width: 100px; height: 140px; } }
    @media (max-width: 480px) { .card { width: 85px; height: 120px; } }
    .card.clickable { pointer-events: all; }
    .card.flipped { transform: rotateY(180deg); }
    .card.scrambling { transition: all 0.3s ease-in-out; }
    .card-face {
      position: absolute;
      width: 100%; height: 100%;
      backface-visibility: hidden;
      border-radius: 15px;
      display: flex; justify-content: center; align-items: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      pointer-events: none; user-select: none;
    }
    .card-front { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .card-back { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); transform: rotateY(180deg); }
    .card-text { 
      font-size: 18px; 
      font-weight: bold;
      color: #fff;
      text-align: center;
      padding: 10px;
      line-height: 1.3;
      filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.3));
    }
    @media (max-width: 768px) { .card-text { font-size: 14px; padding: 8px; } }
    @media (max-width: 480px) { .card-text { font-size: 12px; padding: 6px; } }
    .card-pattern {
      width: 80%; height: 80%;
      background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.1) 10px, rgba(255,255,255,0.1) 20px);
      border-radius: 10px;
    }
    .start-btn {
      position: fixed;
      bottom: 30px; left: 50%; transform: translateX(-50%);
      padding: 15px 40px; font-size: 24px; font-weight: bold;
      color: #fff; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none; border-radius: 50px; cursor: pointer;
      box-shadow: 0 4px 15px rgba(102,126,234,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      z-index: 300;
    }
    @media (max-width: 768px) { .start-btn { bottom: 20px; padding: 12px 35px; font-size: 20px; } }
    @media (max-width: 480px) { .start-btn { bottom: 15px; padding: 10px 30px; font-size: 18px; } }
    .start-btn:hover { transform: translateX(-50%) scale(1.05); box-shadow: 0 6px 20px rgba(102,126,234,0.6); }
    .start-btn:active { transform: translateX(-50%) scale(0.95); }
    .start-btn:disabled {
      background: linear-gradient(135deg, #999 0%, #666 100%);
      cursor: not-allowed;
      opacity: 0.6;
    }
    .prompt {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.95); padding: 30px 50px;
      border-radius: 20px; font-size: 28px; font-weight: bold; color: #333;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 100;
    }
    @media (max-width: 768px) { .prompt { padding: 25px 40px; font-size: 24px; } }
    @media (max-width: 480px) { .prompt { padding: 20px 30px; font-size: 20px; } }
    .prompt.show { opacity: 1; }
    .overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.95);
      display: flex; justify-content: center; align-items: center;
      opacity: 0; pointer-events: none; transition: opacity 0.5s; z-index: 200;
    }
    .overlay.show { opacity: 1; pointer-events: all; }
    .result-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      width: 300px; height: 400px; border-radius: 25px;
      display: flex; justify-content: center; align-items: center;
      box-shadow: 0 20px 60px rgba(102,126,234,0.6);
      transform: scale(0.5); transition: transform 0.5s;
    }
    @media (max-width: 768px) { .result-card { width: 250px; height: 350px; } }
    @media (max-width: 480px) { .result-card { width: 200px; height: 280px; } }
    .overlay.show .result-card { transform: scale(1); }
    .result-text { 
      font-size: 24px; 
      font-weight: bold;
      color: #fff;
      text-align: center;
      padding: 20px;
      line-height: 1.3;
      filter: drop-shadow(4px 4px 8px rgba(0,0,0,0.5));
    }
    @media (max-width: 768px) { .result-text { font-size: 20px; padding: 15px; } }
    @media (max-width: 480px) { .result-text { font-size: 16px; padding: 12px; } }
    .hidden { display: none; }
    .blocked-message {
      position: fixed;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.95);
      padding: 40px 60px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      z-index: 400;
    }
    @media (max-width: 768px) { .blocked-message { padding: 30px 40px; } }
    @media (max-width: 480px) { .blocked-message { padding: 25px 30px; width: 90%; } }
    .blocked-message h2 {
      color: #764ba2;
      font-size: 32px;
      margin-bottom: 15px;
    }
    @media (max-width: 768px) { .blocked-message h2 { font-size: 26px; } }
    @media (max-width: 480px) { .blocked-message h2 { font-size: 22px; } }
    .blocked-message p {
      color: #333;
      font-size: 18px;
      line-height: 1.6;
    }
    @media (max-width: 768px) { .blocked-message p { font-size: 16px; } }
    @media (max-width: 480px) { .blocked-message p { font-size: 14px; } }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="grid" id="grid"></div>
    <button class="start-btn" id="startBtn">START</button>
    <div class="prompt" id="prompt">Pick a Card!</div>
  </div>
  <div class="overlay" id="overlay">
    <div class="result-card">
      <div class="result-text" id="resultIcon"></div>
    </div>
  </div>

  <script>
    // Device Fingerprint Generator
    function generateDeviceFingerprint() {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      ctx.textBaseline = 'top';
      ctx.font = '14px Arial';
      ctx.fillText('fingerprint', 2, 2);
      const canvasData = canvas.toDataURL();
      
      const fingerprint = {
        userAgent: navigator.userAgent,
        language: navigator.language,
        colorDepth: screen.colorDepth,
        screenResolution: `${screen.width}x${screen.height}`,
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        platform: navigator.platform,
        canvas: canvasData,
        hardwareConcurrency: navigator.hardwareConcurrency
      };
      
      return btoa(JSON.stringify(fingerprint));
    }

    // Check if game has been played
    function hasPlayedBefore() {
      const fingerprint = generateDeviceFingerprint();
      const playedFlag = document.cookie.includes('game_played=true');
      const fingerprintMatch = document.cookie.includes(`fp=${fingerprint}`);
      
      return playedFlag || fingerprintMatch;
    }

    // Mark game as played
    function markAsPlayed() {
      const fingerprint = generateDeviceFingerprint();
      const expiryDate = new Date();
      expiryDate.setFullYear(expiryDate.getFullYear() + 10); // 10 years expiry
      
      document.cookie = `game_played=true; expires=${expiryDate.toUTCString()}; path=/; SameSite=Strict`;
      document.cookie = `fp=${fingerprint}; expires=${expiryDate.toUTCString()}; path=/; SameSite=Strict`;
    }

    // Show blocked message
    function showBlockedMessage() {
      const blockedDiv = document.createElement('div');
      blockedDiv.className = 'blocked-message';
      blockedDiv.innerHTML = `
        <h2>🎮 Already Played!</h2>
        <p>You've already played this game on this device.<br>Each device can only play once!</p>
      `;
      document.body.appendChild(blockedDiv);
      
      // Hide game elements
      document.getElementById('grid').style.display = 'none';
      document.getElementById('startBtn').style.display = 'none';
    }

    const texts = [
      'ប្រេងម៉ូតូ 5 កេស', 'ប្រេងម៉ូតូ 5 កេស', 'ប្រេងម៉ូតូ 5 កេស',  // Top row
      'ប្រេងម៉ូតូ 4 កេស', 'ប្រេងម៉ូតូ 4 កេស', 'ប្រេងម៉ូតូ 4 កេស',  // Middle row
      'ប្រេងម៉ូតូ 3 កេស', 'ប្រេងម៉ូតូ 3 កេស', 'បណ្តោងភ្ជួរក្នុងឡាន'   // Bottom row
    ];
    let gameStarted = false;
    let canClick = false;
    let cardData = [];

    const grid = document.getElementById('grid');
    const startBtn = document.getElementById('startBtn');
    const prompt = document.getElementById('prompt');
    const overlay = document.getElementById('overlay');
    const resultIcon = document.getElementById('resultIcon');

    // Check on page load
    if (hasPlayedBefore()) {
      showBlockedMessage();
    } else {
      initCards();
    }

    function initCards() {
      grid.innerHTML = '';
      cardData = texts.map((text, index) => ({
        text: text,
        position: index
      }));
      cardData.forEach((data, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.index = index;
        card.innerHTML = `
          <div class="card-face card-front">
            <div class="card-text">${data.text}</div>
          </div>
          <div class="card-face card-back">
            <div class="card-pattern"></div>
          </div>
        `;
        card.addEventListener('click', () => handleCardClick(index));
        grid.appendChild(card);
      });
    }

    startBtn.addEventListener('click', () => {
      if (gameStarted) return;
      gameStarted = true;
      startBtn.classList.add('hidden');
      setTimeout(() => {
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => card.classList.add('flipped'));
        setTimeout(() => scrambleCards(), 700);
      }, 500);
    });

    function scrambleCards() {
      const cards = document.querySelectorAll('.card');
      const positions = Array.from({length: 9}, (_, i) => i);
      for (let i = positions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [positions[i], positions[j]] = [positions[j], positions[i]];
      }
      cards.forEach((card, index) => {
        card.classList.add('scrambling');
        const newPos = positions[index];
        const row = Math.floor(newPos / 3);
        const col = newPos % 3;
        card.style.transform = `translate(${(col - (index % 3)) * 170}px, ${(row - Math.floor(index / 3)) * 220}px) rotateY(180deg)`;
      });
      let shuffleCount = 0;
      const shuffleInterval = setInterval(() => {
        cards.forEach((card, index) => {
          const newPos = Math.floor(Math.random() * 9);
          const row = Math.floor(newPos / 3);
          const col = newPos % 3;
          const originalRow = Math.floor(index / 3);
          const originalCol = index % 3;
          const cardWidth = window.innerWidth <= 480 ? 85 : (window.innerWidth <= 768 ? 100 : 150);
          const cardHeight = window.innerWidth <= 480 ? 120 : (window.innerWidth <= 768 ? 140 : 200);
          const gap = window.innerWidth <= 480 ? 10 : (window.innerWidth <= 768 ? 12 : 20);
          const spacing = cardWidth + gap;
          const verticalSpacing = cardHeight + gap;
          card.style.transform = `translate(${(col - originalCol) * spacing}px, ${(row - originalRow) * verticalSpacing}px) rotateY(180deg)`;
        });
        shuffleCount++;
        if (shuffleCount >= 8) {
          clearInterval(shuffleInterval);
          finalizePositions(positions);
        }
      }, 150);
    }

    function finalizePositions(positions) {
      const cards = document.querySelectorAll('.card');
      const tempData = [...cardData];
      const newCardData = [];
      cards.forEach((card, oldIndex) => {
        const newPos = positions[oldIndex];
        newCardData[newPos] = tempData[oldIndex];
      });
      cardData = newCardData;
      setTimeout(() => {
        cards.forEach(card => {
          card.style.transform = '';
          card.classList.remove('scrambling');
        });
        setTimeout(() => {
          grid.innerHTML = '';
          cardData.forEach((data, index) => {
            const card = document.createElement('div');
            card.className = 'card flipped';
            card.dataset.index = index;
            card.innerHTML = `
              <div class="card-face card-front">
                <div class="card-text">${data.text}</div>
              </div>
              <div class="card-face card-back">
                <div class="card-pattern"></div>
              </div>
            `;
            card.addEventListener('click', () => handleCardClick(index));
            grid.appendChild(card);
          });
          setTimeout(() => {
            prompt.classList.add('show');
            setTimeout(() => {
              prompt.classList.remove('show');
              canClick = true;
              const allCards = document.querySelectorAll('.card');
              allCards.forEach(card => card.classList.add('clickable'));
            }, 1000);
          }, 300);
        }, 300);
      }, 300);
    }

    // --- Always reveal បណ្តោងភ្ជួរក្នុងឡាន ---
    function handleCardClick(index) {
      if (!canClick) return;
      canClick = false;
      prompt.classList.remove('show');
      const cards = document.querySelectorAll('.card');
      const clickedCard = cards[index];
      
      const result = 'បណ្តោងភ្ជួរក្នុងឡាន'; 

      // Replace card front with បណ្តោងភ្ជួរក្នុងឡាន
      const frontFace = clickedCard.querySelector('.card-front .card-text');
      if (frontFace) {
        frontFace.textContent = result;
      }

      // Flip to reveal
      clickedCard.classList.remove('flipped');

      // Mark as played immediately after card is clicked
      markAsPlayed();

      // Show overlay with same result
      setTimeout(() => {
        resultIcon.textContent = result;
        overlay.classList.add('show');
      }, 1000);
    }
  </script>
</body>
</html>

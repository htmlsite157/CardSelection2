<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Mini Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
    }

    .game-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 40px;
      padding: 20px;
      padding-bottom: 80px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 150px);
      grid-template-rows: repeat(3, 200px);
      gap: 20px;
      perspective: 1000px;
    }

    @media (max-width: 520px) {
      .grid {
        grid-template-columns: repeat(3, 90px);
        grid-template-rows: repeat(3, 125px);
        gap: 12px;
      }
    }

    .card {
      width: 150px;
      height: 200px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s ease;
      cursor: default;
    }

    @media (max-width: 520px) {
      .card { width: 90px; height: 125px; }
    }

    .card.clickable { cursor: pointer; }
    .card.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 14px;
      backface-visibility: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 6px 18px rgba(0,0,0,0.5);
      user-select: none;
    }

    .card-front {
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .card-back {
      background: linear-gradient(135deg, #f093fb, #f5576c);
      transform: rotateY(180deg);
    }

    .card-text {
      font-size: 16px;
      font-weight: bold;
      color: #fff;
      text-align: center;
      padding: 10px;
      line-height: 1.4;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.4);
    }

    @media (max-width: 520px) { .card-text { font-size: 11px; padding: 6px; } }

    .card-pattern {
      width: 75%;
      height: 75%;
      border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.5);
      background: repeating-linear-gradient(
        45deg,
        transparent, transparent 8px,
        rgba(255,255,255,0.25) 8px, rgba(255,255,255,0.25) 16px
      );
    }

    .start-btn {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 44px;
      font-size: 22px;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(102,126,234,0.5);
      transition: transform 0.15s, box-shadow 0.15s;
      z-index: 300;
    }
    .start-btn:hover  { transform: translateX(-50%) scale(1.06); box-shadow: 0 6px 24px rgba(102,126,234,0.7); }
    .start-btn:active { transform: translateX(-50%) scale(0.96); }
    .start-btn.hidden { display: none; }

    .prompt {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.95);
      padding: 28px 50px;
      border-radius: 18px;
      font-size: 26px;
      font-weight: bold;
      color: #333;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 100;
    }
    .prompt.show { opacity: 1; }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.93);
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s;
      z-index: 200;
    }
    .overlay.show { opacity: 1; pointer-events: all; }

    .result-card {
      background: linear-gradient(135deg, #667eea, #764ba2);
      width: 280px; height: 380px;
      border-radius: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 20px 60px rgba(102,126,234,0.6);
      transform: scale(0.5);
      transition: transform 0.5s;
    }
    .overlay.show .result-card { transform: scale(1); }

    .result-text {
      font-size: 26px;
      font-weight: bold;
      color: #fff;
      text-align: center;
      padding: 20px;
      line-height: 1.4;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
    }

    .blocked-message {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.96);
      padding: 40px 60px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      z-index: 500;
    }
    @media (max-width: 480px) { .blocked-message { padding: 28px 30px; width: 88%; } }
    .blocked-message h2 { color: #764ba2; font-size: 30px; margin-bottom: 14px; }
    .blocked-message p  { color: #444; font-size: 17px; line-height: 1.7; }
  </style>
</head>
<body>

  <div class="game-container">
    <div class="grid" id="grid"></div>
  </div>

  <button class="start-btn" id="startBtn">START</button>
  <div class="prompt" id="prompt">Pick a Card!</div>

  <div class="overlay" id="overlay">
    <div class="result-card">
      <div class="result-text" id="resultText"></div>
    </div>
  </div>

  <script>
    // TOKEN SYSTEM
    // Each unique ?token=XYZ can only be used once (stored in localStorage).
    // To let a user play again, send them a new link with a different token.

    function getToken() {
      return new URLSearchParams(window.location.search).get('token');
    }

    function isTokenUsed(token) {
      const used = JSON.parse(localStorage.getItem('used_tokens') || '[]');
      return used.includes(token);
    }

    function markTokenUsed(token) {
      const used = JSON.parse(localStorage.getItem('used_tokens') || '[]');
      if (!used.includes(token)) {
        used.push(token);
        localStorage.setItem('used_tokens', JSON.stringify(used));
      }
    }

    function showBlocked(reason) {
      document.getElementById('startBtn').style.display = 'none';
      document.getElementById('grid').style.display = 'none';
      const div = document.createElement('div');
      div.className = 'blocked-message';
      div.innerHTML = reason === 'no_token'
        ? '<h2>🔒 Invalid Link</h2><p>This link is not valid.<br>Please ask for a valid game link.</p>'
        : '<h2>🎮 Already Played!</h2><p>You\'ve already used this link.<br>Ask for a new link to play again!</p>';
      document.body.appendChild(div);
    }

    const token = getToken();

    if (!token) {
      showBlocked('no_token');
    } else if (isTokenUsed(token)) {
      showBlocked('used');
    } else {
      initGame();
    }

    // GAME LOGIC
    const RESULT = '💵 ទឹកប្រាក់ 10$';

    const prizes = [
      'ប្រេងម៉ូតូ 10 កេស', 'ប្រេងម៉ូតូ 10 កេស', 'ប្រេងម៉ូតូ 10 កេស',
      'ប្រេងម៉ូតូ 5 កេស',  'ប្រេងម៉ូតូ 5 កេស',  'ប្រេងម៉ូតូ 5 កេស',
      'ប្រេងម៉ូតូ 2 កេស',  'ប្រេងម៉ូតូ 2 កេស',  RESULT
    ];

    let cardData    = [];
    let canClick    = false;
    let gameStarted = false;

    const grid       = document.getElementById('grid');
    const startBtn   = document.getElementById('startBtn');
    const prompt     = document.getElementById('prompt');
    const overlay    = document.getElementById('overlay');
    const resultText = document.getElementById('resultText');

    function initGame() {
      cardData = prizes.map((text, i) => ({ text, id: i }));
      renderCards(false); // start face-down so values are hidden
    }

    function renderCards(faceUp) {
      grid.innerHTML = '';
      cardData.forEach((data, index) => {
        const card = document.createElement('div');
        // faceUp=false means add 'flipped' class so the pink back shows
        card.className = 'card' + (faceUp ? '' : ' flipped');
        card.dataset.index = index;
        card.innerHTML =
          '<div class="card-face card-front"><div class="card-text">' + data.text + '</div></div>' +
          '<div class="card-face card-back"><div class="card-pattern"></div></div>';
        card.addEventListener('click', function() { handleClick(index); });
        grid.appendChild(card);
      });
    }

    startBtn.addEventListener('click', function() {
      if (gameStarted) return;
      gameStarted = true;
      startBtn.classList.add('hidden');

      // Flip all cards face-up so user sees the values briefly
      renderCards(true);

      // Then scramble after 1.2s
      setTimeout(scramble, 1200);
    });

    function scramble() {
      function shuffle() {
        for (var i = cardData.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var tmp = cardData[i]; cardData[i] = cardData[j]; cardData[j] = tmp;
        }
      }

      shuffle();
      var count = 0;
      var interval = setInterval(function() {
        shuffle();
        renderCards(true); // keep face-up during shuffle
        count++;
        if (count >= 6) {
          clearInterval(interval);
          // Flip all face-down, then let user pick
          setTimeout(function() {
            renderCards(false);
            setTimeout(function() {
              prompt.classList.add('show');
              setTimeout(function() {
                prompt.classList.remove('show');
                canClick = true;
                var cards = document.querySelectorAll('.card');
                cards.forEach(function(c) { c.classList.add('clickable'); });
              }, 1000);
            }, 400);
          }, 400);
        }
      }, 200);
    }

    function handleClick(index) {
      if (!canClick) return;
      canClick = false;

      var cards = document.querySelectorAll('.card');
      var clicked = cards[index];

      // Always reveal the winning prize
      clicked.querySelector('.card-front .card-text').textContent = RESULT;

      // Flip face-up to reveal
      clicked.classList.remove('flipped');

      // Mark this token as used
      markTokenUsed(token);

      // Show result overlay
      setTimeout(function() {
        resultText.textContent = RESULT;
        overlay.classList.add('show');
      }, 900);
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Mini Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      padding-bottom: 80px;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 130px);
      grid-template-rows: repeat(3, 180px);
      gap: 16px;
    }
    @media (max-width: 500px) {
      .grid {
        grid-template-columns: repeat(3, 85px);
        grid-template-rows: repeat(3, 120px);
        gap: 10px;
      }
    }

    /* CARD FLIP — standard technique */
    .card {
      width: 130px;
      height: 180px;
      position: relative;
      perspective: 600px;
      cursor: default;
    }
    @media (max-width: 500px) {
      .card { width: 85px; height: 120px; }
    }
    .card.clickable { cursor: pointer; }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.55s ease;
    }
    /* face-down by default: back is visible */
    .card.face-down .card-inner  { transform: rotateY(0deg); }
    /* face-up: front is visible */
    .card.face-up   .card-inner  { transform: rotateY(180deg); }

    .card-front,
    .card-back {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      backface-visibility: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 14px rgba(0,0,0,0.6);
    }

    /* BACK — pink, shown when face-down */
    .card-back {
      background: linear-gradient(135deg, #f093fb, #f5576c);
      transform: rotateY(0deg);
    }
    .card-pattern {
      width: 72%; height: 72%;
      border-radius: 8px;
      border: 2px solid rgba(255,255,255,0.5);
      background: repeating-linear-gradient(
        45deg,
        transparent 0px, transparent 7px,
        rgba(255,255,255,0.25) 7px, rgba(255,255,255,0.25) 14px
      );
    }

    /* FRONT — purple, shown when face-up */
    .card-front {
      background: linear-gradient(135deg, #667eea, #764ba2);
      transform: rotateY(180deg);
    }
    .card-text {
      font-size: 15px;
      font-weight: bold;
      color: #fff;
      text-align: center;
      padding: 8px;
      line-height: 1.4;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
    }
    @media (max-width: 500px) { .card-text { font-size: 10px; padding: 5px; } }

    /* START BUTTON */
    .start-btn {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      padding: 13px 44px;
      font-size: 22px;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(102,126,234,0.55);
      z-index: 300;
    }
    .start-btn:hover  { opacity: 0.9; }
    .start-btn.hidden { display: none; }

    /* PICK PROMPT */
    .prompt {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.95);
      padding: 24px 48px;
      border-radius: 16px;
      font-size: 24px;
      font-weight: bold;
      color: #333;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 100;
    }
    .prompt.show { opacity: 1; }

    /* RESULT OVERLAY */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s;
      z-index: 200;
    }
    .overlay.show { opacity: 1; pointer-events: all; }

    .result-card {
      background: linear-gradient(135deg, #667eea, #764ba2);
      width: 260px; height: 360px;
      border-radius: 22px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 20px 60px rgba(102,126,234,0.6);
      transform: scale(0.4);
      transition: transform 0.5s;
    }
    .overlay.show .result-card { transform: scale(1); }
    .result-text {
      font-size: 24px;
      font-weight: bold;
      color: #fff;
      text-align: center;
      padding: 20px;
      line-height: 1.5;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
    }

    /* BLOCKED MESSAGE */
    .blocked-message {
      background: rgba(255,255,255,0.96);
      padding: 38px 56px;
      border-radius: 18px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    @media (max-width: 480px) { .blocked-message { padding: 26px 28px; width: 86%; } }
    .blocked-message h2 { color: #764ba2; font-size: 28px; margin-bottom: 12px; }
    .blocked-message p  { color: #444; font-size: 16px; line-height: 1.7; }
  </style>
</head>
<body>

  <div class="grid" id="grid"></div>

  <button class="start-btn" id="startBtn">START</button>
  <div class="prompt" id="prompt">Pick a Card!</div>

  <div class="overlay" id="overlay">
    <div class="result-card">
      <div class="result-text" id="resultText"></div>
    </div>
  </div>

  <script>
    /* ── TOKEN SYSTEM ──────────────────────────────────────────────
       Each unique ?token=XYZ can only be used once.
       Send a new link with a new token to let the user play again.
    ─────────────────────────────────────────────────────────────── */
    var token = new URLSearchParams(window.location.search).get('token');

    function isTokenUsed(t) {
      var used = JSON.parse(localStorage.getItem('used_tokens') || '[]');
      return used.indexOf(t) !== -1;
    }
    function markTokenUsed(t) {
      var used = JSON.parse(localStorage.getItem('used_tokens') || '[]');
      if (used.indexOf(t) === -1) { used.push(t); }
      localStorage.setItem('used_tokens', JSON.stringify(used));
    }
    function showBlocked(reason) {
      document.getElementById('startBtn').style.display = 'none';
      document.getElementById('grid').style.display = 'none';
      var div = document.createElement('div');
      div.className = 'blocked-message';
      div.innerHTML = reason === 'no_token'
        ? '<h2>🔒 Invalid Link</h2><p>This link is not valid.<br>Please ask for a valid game link.</p>'
        : '<h2>🎮 Already Played!</h2><p>You\'ve already used this link.<br>Ask for a new link to play again!</p>';
      document.body.appendChild(div);
    }

    /* ── INIT ─────────────────────────────────────────────────── */
    var RESULT = '💵 ទឹកប្រាក់ 10$';
    var prizes = [
      'ប្រេងម៉ូតូ 10 កេស', 'ប្រេងម៉ូតូ 10 កេស', 'ប្រេងម៉ូតូ 10 កេស',
      'ប្រេងម៉ូតូ 5 កេស',  'ប្រេងម៉ូតូ 5 កេស',  'ប្រេងម៉ូតូ 5 កេស',
      'ប្រេងម៉ូតូ 2 កេស',  'ប្រេងម៉ូតូ 2 កេស',  RESULT
    ];

    var cardData    = [];
    var canClick    = false;
    var gameStarted = false;

    var grid       = document.getElementById('grid');
    var startBtn   = document.getElementById('startBtn');
    var prompt     = document.getElementById('prompt');
    var overlay    = document.getElementById('overlay');
    var resultText = document.getElementById('resultText');

    if (!token) {
      showBlocked('no_token');
    } else if (isTokenUsed(token)) {
      showBlocked('used');
    } else {
      cardData = prizes.map(function(t, i) { return { text: t, id: i }; });
      renderCards('down');
    }

    /* ── RENDER ───────────────────────────────────────────────── */
    function renderCards(side) {
      // side = 'up' (show prize text) or 'down' (show pink back)
      grid.innerHTML = '';
      cardData.forEach(function(data, index) {
        var card = document.createElement('div');
        card.className = 'card ' + (side === 'up' ? 'face-up' : 'face-down');
        card.innerHTML =
          '<div class="card-inner">' +
            '<div class="card-back"><div class="card-pattern"></div></div>' +
            '<div class="card-front"><div class="card-text">' + data.text + '</div></div>' +
          '</div>';
        card.addEventListener('click', (function(i) {
          return function() { handleClick(i); };
        })(index));
        grid.appendChild(card);
      });
    }

    /* ── START ────────────────────────────────────────────────── */
    startBtn.addEventListener('click', function() {
      if (gameStarted) return;
      gameStarted = true;
      startBtn.classList.add('hidden');

      // Flip all face-up so user sees the prizes
      renderCards('up');

      // Then scramble after 1.2s
      setTimeout(doScramble, 1200);
    });

    /* ── SCRAMBLE ─────────────────────────────────────────────── */
    function shuffle() {
      for (var i = cardData.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = cardData[i]; cardData[i] = cardData[j]; cardData[j] = tmp;
      }
    }

    function doScramble() {
      shuffle();
      var count = 0;
      var iv = setInterval(function() {
        shuffle();
        renderCards('up'); // show face-up while shuffling
        count++;
        if (count >= 6) {
          clearInterval(iv);
          setTimeout(function() {
            renderCards('down'); // flip all face-down
            setTimeout(function() {
              prompt.classList.add('show');
              setTimeout(function() {
                prompt.classList.remove('show');
                canClick = true;
                var cards = document.querySelectorAll('.card');
                for (var i = 0; i < cards.length; i++) {
                  cards[i].classList.add('clickable');
                }
              }, 1000);
            }, 500);
          }, 400);
        }
      }, 220);
    }

    /* ── CLICK ────────────────────────────────────────────────── */
    function handleClick(index) {
      if (!canClick) return;
      canClick = false;

      var cards = document.querySelectorAll('.card');
      var clicked = cards[index];

      // Always show the winning result
      clicked.querySelector('.card-text').textContent = RESULT;
      clicked.classList.remove('face-down');
      clicked.classList.add('face-up');

      markTokenUsed(token);

      setTimeout(function() {
        resultText.textContent = RESULT;
        overlay.classList.add('show');
      }, 900);
    }
  </script>
</body>
</html>
